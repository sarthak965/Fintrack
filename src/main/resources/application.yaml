spring:
  application:
    name: fintrack-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/fintrack?TimeZone=UTC
    username: fintrack_user
    password: fintrack_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: fintrack_user
    password: fintrack_pass

  docker:
    compose:
      enabled: false

server:
  port: 8080

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      access-token-expiration: 900000
      refresh-token-expiration: 604800000

