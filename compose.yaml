services:
  postgres:
    image: postgres:16
    container_name: fintrack-postgres
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack_user
      POSTGRES_PASSWORD: fintrack_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fintrack-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fintrack-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fintrack_user
      RABBITMQ_DEFAULT_PASS: fintrack_pass
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: